name: Deploy to Codeberg Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to pages branch
        run: |
          git config user.name "Forgejo Actions"
          git config user.email "actions@noreply.codeberg.org"

          DEPLOY_DIR=$(mktemp -d)
          cp index.html "$DEPLOY_DIR/" 2>/dev/null || true
          [ -f manifest.json ] && cp manifest.json "$DEPLOY_DIR/"
          [ -f sw.js ]         && cp sw.js         "$DEPLOY_DIR/"
          [ -f style.css ]     && cp style.css     "$DEPLOY_DIR/"
          [ -d icons ]         && cp -r icons      "$DEPLOY_DIR/"
          [ -d www ]           && cp -r www        "$DEPLOY_DIR/"
          for f in *.js; do [ -f "$f" ] && cp "$f" "$DEPLOY_DIR/"; done
          [ -f resume.html ]   && cp resume.html   "$DEPLOY_DIR/"
          [ -f *.pdf ]         && cp *.pdf         "$DEPLOY_DIR/" 2>/dev/null || true

          cd "$DEPLOY_DIR"
          git init
          git remote add origin "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY.git"
          git checkout -b pages
          git add -A
          git commit -m "deploy: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push --force origin pages
